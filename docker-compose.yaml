services:
  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports: 
      - "8000:8000"
    volumes:
      - chroma-data:/data
  
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  chroma-data:
  ollama-data: